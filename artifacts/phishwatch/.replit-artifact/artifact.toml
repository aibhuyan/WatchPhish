kind = "web"
previewPath = "/"
title = "PhishWatch"
version = "1.0.0"
id = "artifacts/phishwatch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21025

[services.development]
run = "pnpm --filter @workspace/phishwatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phishwatch", "run", "build" ]
publicDir = "artifacts/phishwatch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21025"
BASE_PATH = "/"
